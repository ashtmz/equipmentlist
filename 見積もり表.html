<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>見積もり表</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f4efe6;
        --paper: rgba(255, 252, 247, 0.92);
        --paper-strong: #fffdf8;
        --line: rgba(122, 91, 58, 0.16);
        --text: #2f2418;
        --muted: #74624f;
        --accent: #915f36;
        --accent-strong: #734826;
        --accent-soft: rgba(145, 95, 54, 0.12);
        --good: #2f6b46;
        --brand: #915f36;
        --brand-strong: #734826;
        --text-muted: #74624f;
        --success: #2f6b46;
        --warning: #a16207;
        --danger: #b91c1c;
        --radius-md: 18px;
        --radius-lg: 24px;
        --shadow: 0 18px 60px rgba(71, 42, 13, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(circle at top left, rgba(210, 184, 151, 0.38), transparent 34%),
          radial-gradient(circle at top right, rgba(162, 132, 97, 0.18), transparent 28%),
          linear-gradient(180deg, #f7f1e7 0%, var(--bg) 100%);
        color: var(--text);
        font-family: "Avenir Next", "Hiragino Sans", "Yu Gothic", sans-serif;
      }

      .shell {
        width: min(1120px, calc(100vw - 32px));
        margin: 0 auto;
        padding: 28px 0 40px;
      }

      .hero {
        position: relative;
        overflow: hidden;
        padding: 28px;
        border: 1px solid var(--line);
        border-radius: 28px;
        background: linear-gradient(145deg, rgba(255, 248, 238, 0.96), rgba(250, 241, 229, 0.88));
        box-shadow: var(--shadow);
      }

      .hero::after {
        content: "";
        position: absolute;
        inset: auto -18% -36% auto;
        width: 320px;
        height: 320px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(145, 95, 54, 0.14), transparent 62%);
        pointer-events: none;
      }

      .eyebrow {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 6px 12px;
        border-radius: 999px;
        background: var(--accent-soft);
        color: var(--accent-strong);
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .hero h1 {
        margin: 14px 0 8px;
        font-size: clamp(28px, 4vw, 44px);
        line-height: 1.05;
      }

      .hero-corner-actions {
        position: absolute;
        top: 18px;
        right: 18px;
        display: flex;
        align-items: center;
        gap: 8px;
        z-index: 1;
      }

      .hero p {
        margin: 0;
        color: var(--muted);
        font-size: 14px;
      }

      .hero-actions {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 12px;
        margin-top: 18px;
      }

      .hero-icon-button {
        display: inline-grid;
        place-items: center;
        width: 38px;
        height: 38px;
        border: 1px solid rgba(115, 72, 38, 0.18);
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.74);
        color: var(--accent-strong);
        cursor: pointer;
        transition: transform 160ms ease, background 160ms ease, box-shadow 160ms ease;
      }

      .hero-icon-button:hover {
        transform: translateY(-1px);
        box-shadow: 0 8px 20px rgba(115, 72, 38, 0.12);
      }

      .hero-icon-button svg {
        width: 18px;
        height: 18px;
        fill: none;
        stroke: currentColor;
        stroke-width: 1.8;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .hero-button,
      .hero-select {
        min-height: 42px;
        border: 1px solid rgba(115, 72, 38, 0.18);
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.72);
        color: var(--accent-strong);
        font: inherit;
      }

      .hero-button {
        padding: 0 16px;
        font-weight: 700;
        cursor: pointer;
      }

      .hero-button.secondary {
        color: var(--muted);
      }

      .project-picker {
        display: inline-flex;
        flex-direction: column;
        gap: 6px;
        color: var(--muted);
        font-size: 12px;
      }

      .hero-select {
        min-width: 220px;
        padding: 0 12px;
      }

      .hero-note {
        margin-top: 14px;
        padding: 12px 14px;
        border: 1px solid var(--line);
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.56);
        color: var(--muted);
        font-size: 13px;
      }

      .hero-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 18px;
      }

      .hero-meta-card {
        min-width: 180px;
        padding: 14px 16px;
        border: 1px solid var(--line);
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.56);
      }

      .hero-meta-label {
        display: block;
        margin-bottom: 6px;
        color: var(--muted);
        font-size: 12px;
      }

      .hero-meta-value {
        font-size: 18px;
        font-weight: 700;
      }

      .layout {
        display: grid;
        gap: 20px;
        margin-top: 20px;
      }

      .panel {
        border: 1px solid var(--line);
        border-radius: 24px;
        background: var(--paper);
        box-shadow: var(--shadow);
        backdrop-filter: blur(16px);
      }

      .panel-head {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 16px;
        padding: 22px 22px 0;
      }

      .panel-head h2 {
        margin: 0;
        font-size: 22px;
      }

      .panel-head p {
        margin: 8px 0 0;
        color: var(--muted);
        font-size: 14px;
      }

      .summary-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 12px;
        padding: 20px 22px 22px;
      }

      .summary-card {
        padding: 16px;
        border-radius: 20px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.6);
      }

      .summary-card strong {
        display: block;
        font-size: 12px;
        color: var(--muted);
        margin-bottom: 8px;
      }

      .summary-card span {
        font-size: 24px;
        font-weight: 700;
      }

      .summary-card.accent {
        background: linear-gradient(135deg, rgba(145, 95, 54, 0.16), rgba(255, 255, 255, 0.72));
      }

      .table-wrap {
        padding: 0 22px 22px;
        overflow-x: auto;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        min-width: 760px;
      }

      th,
      td {
        padding: 14px 12px;
        border-bottom: 1px solid var(--line);
        text-align: left;
        vertical-align: middle;
      }

      th {
        color: var(--muted);
        font-size: 12px;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      tbody tr:last-child td {
        border-bottom: none;
      }

      .item-kind {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 4px 10px;
        border-radius: 999px;
        background: var(--accent-soft);
        color: var(--accent-strong);
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.05em;
        text-transform: uppercase;
      }

      .item-name {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .sub-line {
        color: var(--muted);
        font-size: 12px;
      }

      .qty-controls {
        display: inline-flex;
        align-items: center;
        gap: 8px;
      }

      .qty-controls button {
        width: 32px;
        height: 32px;
        border: none;
        border-radius: 12px;
        background: var(--accent-soft);
        color: var(--accent-strong);
        font-size: 18px;
        cursor: pointer;
      }

      .qty-controls button:disabled {
        cursor: not-allowed;
        opacity: 0.4;
      }

      .qty-value {
        min-width: 34px;
        text-align: center;
        font-weight: 700;
      }

      .stock-chip {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 5px 10px;
        border-radius: 999px;
        background: rgba(47, 107, 70, 0.12);
        color: var(--good);
        font-size: 12px;
        font-weight: 700;
      }

      .muted {
        color: var(--muted);
      }

      .adjustments {
        padding: 0 22px 22px;
      }

      .adjustment-list {
        display: grid;
        gap: 10px;
      }

      .adjustment-card {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        padding: 14px 16px;
        border: 1px solid var(--line);
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.52);
      }

      .primary-button,
      .ghost-button,
      .danger-button,
      .mini-button,
      .asset-icon-button,
      .project-card-main,
      .pill-action {
        appearance: none;
        border: 1px solid var(--line);
        cursor: pointer;
        font: inherit;
      }

      .primary-button,
      .ghost-button,
      .danger-button,
      .mini-button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 42px;
        padding: 0 16px;
        border-radius: 999px;
        transition: transform 160ms ease, box-shadow 160ms ease, background 160ms ease;
      }

      .primary-button:hover,
      .ghost-button:hover,
      .danger-button:hover,
      .mini-button:hover,
      .pill-action:hover,
      .asset-icon-button:hover {
        transform: translateY(-1px);
      }

      .primary-button {
        background: linear-gradient(135deg, var(--accent), var(--accent-strong));
        color: #fff;
        box-shadow: 0 8px 20px rgba(115, 72, 38, 0.18);
      }

      .ghost-button,
      .mini-button,
      .asset-icon-button,
      .project-card-main,
      .pill-action {
        background: rgba(255, 255, 255, 0.74);
        color: var(--text);
      }

      .danger-button {
        background: rgba(254, 226, 226, 0.88);
        color: var(--danger);
      }

      .mini-button {
        min-height: 34px;
        padding: 0 12px;
      }

      .toolbar {
        display: grid;
        grid-template-columns: minmax(0, 1.6fr) auto;
        gap: 10px;
        margin: 18px 0 12px;
      }

      .search-wrap,
      .field,
      .select,
      .text-input,
      .number-input {
        width: 100%;
      }

      .search-wrap {
        position: relative;
      }

      .search-wrap::before {
        content: "検索";
        position: absolute;
        top: 50%;
        left: 14px;
        transform: translateY(-50%);
        color: var(--text-muted);
        font-size: 0.86rem;
        pointer-events: none;
      }

      .text-input,
      .number-input,
      .select {
        min-height: 46px;
        padding: 0 14px;
        border-radius: 16px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.72);
        color: var(--text);
        font: inherit;
      }

      .search-wrap .text-input {
        padding-left: 62px;
      }

      .filter-panel {
        display: grid;
        grid-template-columns: repeat(5, minmax(0, 1fr));
        gap: 10px;
        padding: 12px;
        margin-bottom: 12px;
        border-radius: var(--radius-lg);
        background: rgba(255, 255, 255, 0.52);
        border: 1px solid var(--line);
      }

      .muted-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        flex-wrap: wrap;
        margin-bottom: 8px;
        color: var(--text-muted);
        font-size: 0.92rem;
      }

      .equipment-name {
        font-weight: 700;
        overflow-wrap: anywhere;
      }

      .equipment-heading {
        display: inline-flex;
        align-items: center;
        flex-wrap: wrap;
        gap: 8px;
        min-width: 0;
      }

      .equipment-cell {
        display: flex;
        align-items: flex-start;
        gap: 10px;
        min-width: 0;
      }

      .manufacturer-chip {
        display: inline-flex;
        align-items: center;
        min-height: 24px;
        padding: 0 8px;
        border-radius: 999px;
        background: rgba(122, 91, 58, 0.1);
        color: var(--accent-strong);
        font-size: 0.76rem;
        font-weight: 700;
      }

      .note-text {
        margin: 0;
        color: var(--text-muted);
        line-height: 1.55;
        overflow-wrap: anywhere;
      }

      .sub-note {
        margin-top: 6px;
        color: var(--text-muted);
        font-size: 0.82rem;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        min-height: 28px;
        padding: 0 10px;
        border-radius: 999px;
        font-size: 0.82rem;
        font-weight: 700;
      }

      .badge-gray {
        background: rgba(100, 116, 139, 0.16);
        color: #475569;
      }

      .stock {
        font-weight: 700;
      }

      .stock-ok {
        color: var(--success);
      }

      .stock-low {
        color: var(--warning);
      }

      .stock-empty {
        color: var(--danger);
      }

      .action-cluster {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        flex-wrap: wrap;
      }

      .pill-action {
        display: inline-grid;
        place-items: center;
        min-width: 30px;
        height: 30px;
        padding: 0 8px;
        border-radius: 999px;
        font-size: 0.8rem;
      }

      .pill-action[disabled] {
        opacity: 0.42;
        cursor: not-allowed;
      }

      .asset-icon-button {
        display: inline-grid;
        place-items: center;
        width: 30px;
        height: 30px;
        padding: 0;
        border-radius: 10px;
        color: var(--text-muted);
      }

      .selected-qty {
        font-weight: 700;
        color: var(--brand-strong);
        min-width: 24px;
        text-align: center;
      }

      .selected-qty.is-zero {
        color: var(--text-muted);
      }

      .inventory-grid,
      .selection-grid,
      .project-grid,
      .selection-picker-grid,
      .history-list {
        display: grid;
        gap: 12px;
      }

      .project-grid {
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      }

      .selection-picker-grid {
        grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      }

      .inventory-card,
      .project-card,
      .history-card {
        border-radius: var(--radius-lg);
        border: 1px solid rgba(122, 91, 58, 0.2);
        background: rgba(255, 255, 255, 0.9);
        box-shadow: 0 10px 24px rgba(71, 42, 13, 0.08);
      }

      .inventory-card {
        display: grid;
        gap: 8px;
        padding: 12px 14px;
      }

      .inventory-card-top {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 14px;
      }

      .inventory-card-main {
        display: grid;
        gap: 8px;
        min-width: 0;
        flex: 1 1 auto;
      }

      .inventory-inline-groups {
        display: flex;
        align-items: center;
        gap: 12px 18px;
        flex-wrap: wrap;
      }

      .inventory-stock-total {
        color: var(--text-muted);
        font-weight: 600;
      }

      .inventory-card-bottom {
        display: grid;
        grid-template-columns: minmax(0, 1fr);
        gap: 8px;
        align-items: start;
      }

      .info-group {
        display: grid;
        gap: 8px;
        min-width: 0;
      }

      .info-group-wide {
        grid-column: 1 / -1;
      }

      .info-label {
        color: var(--text-muted);
        font-size: 0.8rem;
        font-weight: 700;
        letter-spacing: 0.03em;
        text-transform: uppercase;
      }

      .inline-info {
        display: flex;
        align-items: center;
        gap: 8px;
        min-width: 0;
        flex-wrap: wrap;
      }

      .card-actions {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        flex-wrap: wrap;
        padding-top: 6px;
        border-top: 1px solid rgba(122, 91, 58, 0.1);
      }

      .selection-picker-card .card-actions {
        justify-content: flex-start;
      }

      .empty-state {
        display: grid;
        place-items: center;
        gap: 8px;
        min-height: 220px;
        padding: 32px 16px;
        text-align: center;
      }

      .empty-state-mark {
        display: grid;
        place-items: center;
        width: 76px;
        height: 76px;
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.64);
        color: var(--text-muted);
        font-size: 2rem;
      }

      .empty-state.compact {
        min-height: 0;
        padding: 20px 16px;
      }

      .section-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
        flex-wrap: wrap;
        padding: 22px 22px 0;
      }

      .section-head h2,
      .section-head p,
      .estimate-selected-head h3,
      .estimate-selected-head p {
        margin: 0;
      }

      .section-head p,
      .estimate-selected-head p {
        color: var(--text-muted);
        font-size: 0.92rem;
      }

      .section-head-actions,
      .selection-workspace-actions {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
      }

      .project-card {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 10px;
        align-items: center;
        padding: 12px;
      }

      .project-stack {
        display: grid;
        gap: 8px;
      }

      .project-card-actions {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .project-card.active {
        border-color: rgba(145, 95, 54, 0.26);
        background: rgba(250, 241, 229, 0.96);
      }

      .project-card-main {
        display: grid;
        gap: 4px;
        padding: 0;
        text-align: left;
        border: none;
      }

      .project-card-main strong {
        font-size: 1rem;
      }

      .project-card-main span {
        color: var(--text-muted);
        font-size: 0.88rem;
      }

      .selection-project-summary {
        display: inline-flex;
        align-items: center;
        min-height: 36px;
        padding: 0 14px;
        border-radius: 999px;
        background: rgba(145, 95, 54, 0.1);
        color: var(--accent-strong);
        font-weight: 700;
      }

      .project-result-panel {
        padding: 14px 16px 16px;
        border-radius: 20px;
        border: 1px solid rgba(145, 95, 54, 0.16);
        background: rgba(255, 255, 255, 0.82);
      }

      .project-result-head {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: center;
        margin-bottom: 12px;
        flex-wrap: wrap;
      }

      .project-result-head h3,
      .project-result-head p {
        margin: 0;
      }

      .project-result-head p {
        color: var(--text-muted);
        font-size: 0.9rem;
      }

      .project-result-table {
        width: 100%;
        border-collapse: collapse;
        min-width: 0;
      }

      .project-result-table th,
      .project-result-table td {
        padding: 10px 8px;
        border-bottom: 1px solid rgba(122, 91, 58, 0.12);
        text-align: left;
        vertical-align: top;
      }

      .project-result-table th {
        color: var(--text-muted);
        font-size: 12px;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      .project-result-table tbody tr:last-child td {
        border-bottom: none;
      }

      .project-result-summary {
        margin-top: 12px;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
        gap: 10px;
      }

      .project-result-card {
        padding: 12px 14px;
        border-radius: 16px;
        border: 1px solid rgba(122, 91, 58, 0.12);
        background: rgba(250, 241, 229, 0.5);
      }

      .project-result-card strong {
        display: block;
        margin-bottom: 6px;
        font-size: 12px;
        color: var(--text-muted);
      }

      .project-result-card span {
        font-size: 1.1rem;
        font-weight: 700;
      }

      .project-adjustments-section {
        margin-top: 14px;
        padding-top: 14px;
        border-top: 1px solid rgba(122, 91, 58, 0.12);
      }

      .project-adjustments-section h4 {
        margin: 0 0 10px;
        font-size: 14px;
      }

      .project-adjustments-grid {
        display: grid;
        gap: 10px;
      }

      .project-adjustment-row {
        display: grid;
        grid-template-columns: minmax(0, 1.2fr) minmax(0, 1.1fr) 120px minmax(0, 1fr) auto;
        gap: 8px;
        align-items: center;
      }

      .project-adjustment-row .select,
      .project-adjustment-row .number-input,
      .project-adjustment-row .text-input {
        min-height: 40px;
      }

      .section-panel-inner {
        margin: 18px 22px 22px;
        border-radius: 22px;
        background: rgba(255, 255, 255, 0.56);
      }

      .estimate-subsection {
        margin: 18px;
      }

      .estimate-panel-packages {
        border-color: rgba(145, 95, 54, 0.18);
        background: rgba(250, 241, 229, 0.84);
      }

      .estimate-panel-extras {
        border-color: rgba(122, 91, 58, 0.18);
        background: rgba(255, 252, 247, 0.92);
      }

      .estimate-collapsed-note {
        margin-top: 10px;
        padding: 12px 14px;
        border: 1px dashed rgba(122, 91, 58, 0.18);
        border-radius: 16px;
        color: var(--text-muted);
        background: rgba(255, 255, 255, 0.5);
      }

      .pack-grid {
        margin-top: 16px;
      }

      .extra-fee-grid {
        margin-bottom: 18px;
      }

      .estimate-selected-list {
        margin-top: 18px;
        padding-top: 16px;
        border-top: 1px dashed rgba(122, 91, 58, 0.18);
      }

      .history-card {
        padding: 14px 16px;
      }

      function normalizePayload(sourcePayload = null) {
        if (!sourcePayload || typeof sourcePayload !== "object") {

        const snapshot = sourcePayload?.snapshot && typeof sourcePayload.snapshot === "object"

        const activeProject = snapshot.estimateProjects.find((entry) => idsEqual(entry.id, sourcePayload?.projectId)) || snapshot.estimateProjects[0] || null;

      function createPayloadFromSharedList(rawData) {

        return normalizePayload({
          exportedAt: String(rawData?.exportedAt || new Date().toISOString()),
          projectId: firstProject?.id || "",
          projectName: String(firstProject?.name || defaultProjectName).trim() || defaultProjectName,

      function extractPayloadFromHtml(rawText) {
        const scriptCloseToken = "</scr" + "ipt>";
        const payloadPattern = new RegExp(`window\\.__CLIENT_ESTIMATE_PAYLOAD__ = ([\\s\\S]*?);\\s*${scriptCloseToken}`);
        const match = rawText.match(payloadPattern);
        if (!match) {

        const jsonText = String(match[1] || "").trim();
        if (!jsonText || jsonText === "null") {

        return JSON.parse(jsonText);

      function parseImportedPayload(rawText) {
        const embeddedPayload = extractPayloadFromHtml(rawText);
        if (embeddedPayload) {
          return embeddedPayload;

        const parsed = JSON.parse(rawText);
        if (parsed && typeof parsed === "object" && parsed.snapshot && Object.prototype.hasOwnProperty.call(parsed, "projectId")) {
          return parsed;

        if (parsed && typeof parsed === "object" && Array.isArray(parsed.estimateProjects)) {
          return createPayloadFromSharedList(parsed);

        throw new Error("見積データとして解釈できませんでした。");

      function createState(sourcePayload = currentPayload) {

      function saveIconSVG() {

          <svg viewBox="0 0 24 24" aria-hidden="true">

          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")

      function isHtmlLikeFileName(name = "") {

      function getSuggestedTemplateFileName() {
        const currentFileName = decodeURIComponent(String(window.location.pathname || "").split("/").pop() || "").trim();
        if (isHtmlLikeFileName(currentFileName)) {

        const title = String(currentPayload?.settings?.pageTitle || "見積もり表").trim() || "見積もり表";

      function serializeCurrentTemplateHtml() {
        const scriptCloseToken = "</scr" + "ipt>";

        return ORIGINAL_TEMPLATE_HTML
          .replace(/<title>[\s\S]*?<\/title>/i, `<title>${escapeHtmlText(currentPayload?.settings?.pageTitle || "見積もり表")}</title>`)
          .replace(/window\.__CLIENT_ESTIMATE_PAYLOAD__ = [\s\S]*?;/, `window.__CLIENT_ESTIMATE_PAYLOAD__ = ${payloadJson};`);

      function downloadSerializedTemplateHtml() {
        const blob = new Blob([serializeCurrentTemplateHtml()], { type: "text/html;charset=utf-8" });

        const link = document.createElement("a");
        link.href = objectUrl;

        link.rel = "noopener";
        link.style.display = "none";
        document.body.appendChild(link);
        link.click();
        window.setTimeout(() => {
          link.remove();
          URL.revokeObjectURL(objectUrl);

      async function writeTemplateToHandle(handle) {

      async function saveTemplateToHtml(forcePrompt = false) {

        if (handle) {

          return true;

        downloadSerializedTemplateHtml();
        hasUnsavedTemplateChanges = false;
        return true;

      function scheduleTemplateSave() {

            ${currentPayload ? `<button class="hero-icon-button" type="button" data-action="save-template-html" aria-label="このHTMLを保存" title="このHTMLを保存">${saveIconSVG()}</button>` : ""}
            <button class="hero-icon-button" type="button" data-action="open-import" aria-label="リストファイルを読み込む" title="リストファイルを読み込む">${uploadIconSVG()}</button>

        state = createState(currentPayload);

      async function importListFile(file, options = {}) {
        if (!file) {
          return;

        try {
          const rawText = await file.text();
          const nextPayload = parseImportedPayload(rawText);
          const importedHtml = isHtmlLikeFileName(file.name);
          if (importedHtml && options.fileHandle) {
            currentTemplateFileHandle = options.fileHandle;
          }
          applyPayload(nextPayload, {
            sourceKind: "file",
            sourceLabel: options.sourceLabel || file.name,
            resetUiState: true,
            markDirty: !importedHtml,

        } catch (error) {
          window.alert("リストファイルを読み込めませんでした。共有データ JSON か、書き出し済みの見積 HTML を選択してください。");

      async function openImportPicker() {

                  "text/html": [".html", ".htm"],

            const file = await handle.getFile();

          } catch (error) {
            if (error?.name === "AbortError") {
              return;

          }

        document.getElementById("estimate-file-input")?.click();

      function switchProject(projectId) {
        const projects = Array.isArray(currentPayload?.snapshot?.estimateProjects) ? currentPayload.snapshot.estimateProjects : [];
        const nextProject = projects.find((entry) => String(entry.id) === String(projectId));
        if (!nextProject) {
          return;

        const previousTitle = String(currentPayload?.settings?.pageTitle || "").trim();
        const previousProjectName = String(currentPayload?.projectName || "").trim();
        const nextTitle = !previousTitle || previousTitle === previousProjectName ? String(nextProject.name || "見積もり表") : previousTitle;
        applyPayload({
          ...currentPayload,
          projectId: nextProject.id,
          projectName: String(nextProject.name || "見積もり表").trim() || "見積もり表",
          settings: {
            ...currentPayload.settings,

        const nextTitle = window.prompt("ページタイトルを入力してください。", currentTitle);

        currentPayload.settings = {
          ...currentPayload.settings,
          pageTitle: String(nextTitle).trim() || "見積もり表",

        state = createState(currentPayload);
        markTemplateDirty();
        render();

      function getEstimateProject(projectId = currentPayload?.projectId) {
        return (currentPayload?.snapshot?.estimateProjects || []).find((entry) => idsEqual(entry.id, projectId)) || null;
      }

      function getActiveEstimateProject() {
        return getEstimateProject(currentPayload?.projectId);
      }

      function getEstimateSelections(projectId = currentPayload?.projectId) {
        return getEstimateProject(projectId)?.items ?? [];
      }

      function getEstimatePackSelections(projectId = currentPayload?.projectId) {
        return getEstimateProject(projectId)?.packItems ?? [];
      }

      function getEstimateExtraItems(projectId = currentPayload?.projectId) {
        return getEstimateProject(projectId)?.extraItems ?? [];
      }

      function getEstimateSelectedQty(projectId, equipId) {
        return getEstimateSelections(projectId).find((item) => idsEqual(item.equipId, equipId))?.qty ?? 0;
      }

      function getEstimateSelectedPackQty(projectId, packId) {
        return getEstimatePackSelections(projectId).find((item) => idsEqual(item.packId, packId))?.qty ?? 0;
      }

      function getEstimateSelectedExtraQty(projectId, templateId) {
        return getEstimateExtraItems(projectId)
          .filter((item) => idsEqual(item.extraFeeId, templateId))
          .reduce((sum, item) => sum + toPositiveInt(item.qty, 0), 0);
      }

      function getEstimateRequiredQty(projectId, equipId) {
        const project = getEstimateProject(projectId);
        if (!project) {
          return 0;
        }

        let qty = getEstimateSelectedQty(projectId, equipId);
        (project.packItems || []).forEach((entry) => {
          const pack = getPack(entry.packId);
          (pack?.items || []).forEach((packItem) => {
            if (idsEqual(packItem.equipId, equipId)) {
              qty += toPositiveInt(packItem.qty, 0) * toPositiveInt(entry.qty, 0);
            }
          });
        });
        return qty;
      }

      function getEstimateRemainingStock(projectId, equipId) {
        const item = getEquipment(equipId);
        if (!item) {
          return 0;
        }
        return Math.max(0, toPositiveInt(item.stock, 0) - getEstimateRequiredQty(projectId, equipId));
      }

      function canAddEstimateSelection(projectId, equipId) {
        if (!state.settings.showStock && state.settings.ignoreStockLimit) {
          return true;
        }
        return getEstimateRemainingStock(projectId, equipId) > 0;
      }

      function getEstimatePackCapacity(projectId, packId) {
        const pack = getPack(packId);
        if (!pack || !Array.isArray(pack.items) || pack.items.length === 0) {
          return null;
        }

        const currentPackQty = getEstimateSelectedPackQty(projectId, packId);
        let maxQty = Infinity;
        pack.items.forEach((packItem) => {
          const item = getEquipment(packItem.equipId);
          if (!item || toPositiveInt(packItem.qty, 0) <= 0) {
            return;
          }
          const consumedByOthers = getEstimateRequiredQty(projectId, packItem.equipId) - currentPackQty * toPositiveInt(packItem.qty, 0);
          const availableForPack = Math.max(toPositiveInt(item.stock, 0) - consumedByOthers, 0);
          const itemMaxQty = Math.floor(availableForPack / toPositiveInt(packItem.qty, 1));
          maxQty = Math.min(maxQty, itemMaxQty);
        });

        return Number.isFinite(maxQty) ? Math.max(maxQty, 0) : null;
      }

      function canAddEstimatePackSelection(projectId, packId) {
        if (!state.settings.showStock && state.settings.ignoreStockLimit) {
          return true;
        }
        const capacity = getEstimatePackCapacity(projectId, packId);
        if (capacity === null) {
          return true;
        }
        return getEstimateSelectedPackQty(projectId, packId) + 1 <= capacity;
      }

      function getEstimateProjectTotals(project) {
        const items = project?.items ?? [];
        const packItems = project?.packItems ?? [];
        const extraItems = project?.extraItems ?? [];
        return {
          itemCount: items.length,
          qty: items.reduce((sum, item) => sum + toPositiveInt(item.qty, 0), 0),
          packCount: packItems.length,
          packQty: packItems.reduce((sum, item) => sum + toPositiveInt(item.qty, 0), 0),
          extraCount: extraItems.length,

        return (pack?.items || [])
          .map((entry) => {
