            return item ? `${item.name} ×${entry.qty}` : "";
          })
          .filter(Boolean)
          .join(" / ");
      }

      function getNextEstimateProjectName() {
        const names = new Set((currentPayload?.snapshot?.estimateProjects || []).map((project) => project.name));
        let index = 1;
        while (names.has(`見積もり${index}`)) {
          index += 1;
        }
        return `見積もり${index}`;
      }

      function createEstimateProject(name = "") {
        return createEmptyProject({
          id: `estimate-${Date.now()}-${Math.random().toString(16).slice(2)}`,
          name: String(name || "").trim() || getNextEstimateProjectName(),
        });
      }

      function createEstimateProjectFromPrompt() {
        if (!currentPayload) {
          return;
        }
        const suggestedName = getNextEstimateProjectName();
        const nextName = window.prompt("見積もり名を入力してください。", suggestedName);
        if (nextName === null) {
          return;
        }
        const project = createEstimateProject(nextName);
        const projects = Array.isArray(currentPayload.snapshot?.estimateProjects) ? currentPayload.snapshot.estimateProjects : [];
        projects.push(project);
        currentPayload.snapshot.estimateProjects = projects;
        currentPayload.projectId = project.id;
        currentPayload.projectName = project.name;
        state = createState(currentPayload);
        markTemplateDirty();
        render();
      }

      function deleteEstimateProject(projectId) {
        const project = getEstimateProject(projectId);
        if (!project) {
          return;
        }
        if (!window.confirm(`「${project.name}」を削除しますか？`)) {
          return;
        }
        currentPayload.snapshot.estimateProjects = (currentPayload.snapshot?.estimateProjects || []).filter((entry) => !idsEqual(entry.id, projectId));
        const nextProject = currentPayload.snapshot.estimateProjects[0] || null;
        currentPayload.projectId = nextProject?.id || "";
        currentPayload.projectName = nextProject?.name || state.settings.pageTitle || "見積もり表";
        state = createState(currentPayload);
        markTemplateDirty();
        render();
      }

      function toggleEstimateSection(section) {
        if (section !== "packages" && section !== "extras") {
          return;
        }
        uiState.estimateSectionOpen[section] = !uiState.estimateSectionOpen[section];
        render();
      }

      function badge(label, kind) {
        return `<span class="badge ${kind}">${escapeHTML(label)}</span>`;
      }

      function equipmentHeading(item) {
        if (!item) {
          return `<span class="equipment-name">(不明)</span>`;
        }
        return `
          <span class="equipment-heading">
            ${item.manufacturer ? `<span class="manufacturer-chip">${escapeHTML(item.manufacturer)}</span>` : ""}
            <span class="equipment-name">${escapeHTML(item.name || "(不明)")}</span>
          </span>
        `;
      }

      function getActiveFilters(overrides = {}) {
        return {
          keyword: uiState.searchText.trim().toLowerCase(),
          manufacturer: uiState.filterManufacturer,
          genre: uiState.filterGenre,
          type: uiState.filterType,
          ownership: uiState.filterOwnership,
          ...overrides,
        };
      }

      function matchesEquipmentFilters(item, filters) {
        if (filters.keyword) {
          const ownershipText = getItemOwnerships(item).map((entry) => entry.name).join(" ");
          const genreText = getItemGenres(item).join(" ");
          const typeText = getItemTypes(item).join(" ");
          const haystack = `${item.manufacturer || ""} ${item.name || ""} ${item.notes || ""} ${ownershipText} ${genreText} ${typeText}`.toLowerCase();
          if (!haystack.includes(filters.keyword)) {
            return false;
          }
        }

        if (filters.manufacturer && item.manufacturer !== filters.manufacturer) {
          return false;
        }

        if (filters.genre && !getItemGenres(item).includes(filters.genre)) {
          return false;
        }

        if (filters.type && !getItemTypes(item).includes(filters.type)) {
          return false;
        }

        if (filters.ownership && !getItemOwnerships(item).some((entry) => entry.name === filters.ownership)) {
          return false;
        }

        return true;
      }

      function getEquipmentByFilters(overrides = {}) {
        const filters = getActiveFilters(overrides);
        return (state.snapshot?.equipment || [])
          .filter((item) => matchesEquipmentFilters(item, filters))
          .sort((left, right) => compareText(`${left.manufacturer || ""} ${left.name || ""}`, `${right.manufacturer || ""} ${right.name || ""}`));
      }

      function getLinkedFilterOptions(fieldName) {
        const baseItems = getEquipmentByFilters({
          manufacturer: fieldName === "manufacturer" ? "" : uiState.filterManufacturer,
          genre: fieldName === "genre" ? "" : uiState.filterGenre,
          type: fieldName === "type" ? "" : uiState.filterType,
          ownership: fieldName === "ownership" ? "" : uiState.filterOwnership,
        });

        if (fieldName === "manufacturer") {
          return [...new Set(baseItems.map((item) => item.manufacturer).filter(Boolean))].sort(compareText);
        }
        if (fieldName === "genre") {
          return [...new Set(baseItems.flatMap((item) => getItemGenres(item)).filter(Boolean))].sort(compareText);
        }
        if (fieldName === "type") {
          return [...new Set(baseItems.flatMap((item) => getItemTypes(item)).filter(Boolean))].sort(compareText);
        }
        if (fieldName === "ownership") {
          return [...new Set(baseItems.flatMap((item) => getItemOwnerships(item).map((entry) => entry.name)).filter(Boolean))].sort(compareText);
        }
        return [];
      }

      function clearFilters() {
        uiState.searchText = "";
        uiState.filterManufacturer = "";
        uiState.filterGenre = "";
        uiState.filterType = "";
        uiState.filterOwnership = "";
        render();
      }

      function getEquipment(equipId) {
        return (state.snapshot.equipment || []).find((item) => idsEqual(item.id, equipId)) || null;
      }

      function getPack(packId) {
        return (state.snapshot.packs || []).find((item) => idsEqual(item.id, packId)) || null;
      }

      function getExtraFeeTemplate(templateId) {
        return (state.snapshot.extraFeeTemplates || []).find((item) => idsEqual(item.id, templateId)) || null;
      }

      function getProjectDirectQty(equipId) {
        return (state.project?.items || []).find((item) => idsEqual(item.equipId, equipId))?.qty || 0;
      }

      function getProjectPackQty(packId) {
        return (state.project?.packItems || []).find((item) => idsEqual(item.packId, packId))?.qty || 0;
      }

      function getProjectRequiredQty(equipId) {
        let qty = getProjectDirectQty(equipId);
        (state.project?.packItems || []).forEach((entry) => {
          const pack = getPack(entry.packId);
          (pack?.items || []).forEach((packItem) => {
            if (idsEqual(packItem.equipId, equipId)) {
              qty += toPositiveInt(packItem.qty, 0) * toPositiveInt(entry.qty, 0);
            }
          });
        });
        return qty;
      }

      function canAddEquipment(equipId) {
        if (!state.settings.showStock && state.settings.ignoreStockLimit) {
          return true;
        }
        const item = getEquipment(equipId);
        if (!item) {
          return true;
        }
        return getProjectRequiredQty(equipId) + 1 <= toPositiveInt(item.stock, 0);
      }

      function getPackCapacity(packId) {
        const pack = getPack(packId);
        if (!pack || !Array.isArray(pack.items) || pack.items.length === 0) {
          return null;
        }

        const currentPackQty = getProjectPackQty(packId);
        let maxQty = Infinity;
        pack.items.forEach((packItem) => {
          const item = getEquipment(packItem.equipId);
          if (!item || toPositiveInt(packItem.qty, 0) <= 0) {
            return;
          }
          const consumedByOthers = getProjectRequiredQty(packItem.equipId) - currentPackQty * toPositiveInt(packItem.qty, 0);
          const availableForPack = Math.max(toPositiveInt(item.stock, 0) - consumedByOthers, 0);
          const itemMaxQty = Math.floor(availableForPack / toPositiveInt(packItem.qty, 1));
          maxQty = Math.min(maxQty, itemMaxQty);
        });

        return Number.isFinite(maxQty) ? Math.max(maxQty, 0) : null;
      }

      function canAddPack(packId) {
        if (!state.settings.showStock && state.settings.ignoreStockLimit) {
          return true;
        }
        const capacity = getPackCapacity(packId);
        if (capacity === null) {
          return true;
        }
        return getProjectPackQty(packId) + 1 <= capacity;
      }

      function createEntriesForProject(project = state.project) {
        const targetProject = project || null;
        const targetProjectId = targetProject?.id || currentPayload?.projectId;

        const equipmentEntries = (targetProject?.items || []).filter((entry) => toPositiveInt(entry.qty, 0) > 0).map((entry) => {
          const item = getEquipment(entry.equipId);
          return {
            key: `equipment:${entry.equipId}`,
            type: "equipment",
            id: entry.equipId,
            kindLabel: "機材",
            name: item ? `${item.manufacturer || ""} ${item.name || ""}`.trim() : "(不明)",
            qty: toPositiveInt(entry.qty, 0),
            price: toPositiveInt(item?.price, 0),
            costPrice: item?.isNetPrice ? toPositiveInt(item?.priceLower, 0) : null,
            stock: item ? toPositiveInt(item.stock, 0) : null,
            note: "",
          };
        });

        const packEntries = (targetProject?.packItems || []).filter((entry) => toPositiveInt(entry.qty, 0) > 0).map((entry) => {
          const pack = getPack(entry.packId);
          const capacity = getEstimatePackCapacity(targetProjectId, entry.packId);
          return {
            key: `pack:${entry.packId}`,
            type: "pack",
            id: entry.packId,
            kindLabel: "セット",
            name: pack?.name || "セット(不明)",
            qty: toPositiveInt(entry.qty, 0),
            price: toPositiveInt(pack?.price, 0),
            costPrice: null,
            stock: capacity,
            note: pack?.items?.length ? `${pack.items.length} 点で構成` : "",
          };
        });

        const extraEntries = (targetProject?.extraItems || []).filter((entry) => toPositiveInt(entry.qty, 0) > 0).map((entry) => ({
          key: `extra:${entry.id}`,
          type: "extra",
          id: entry.id,
          kindLabel: "追加費用",
          name: `${entry.category || "その他"}: ${entry.name || ""}`,
          qty: toPositiveInt(entry.qty, 0),
          price: toPositiveInt(entry.unitPrice, 0),
          costPrice: null,
          stock: null,
          note: entry.notes || "",
        }));

        return [...equipmentEntries, ...packEntries, ...extraEntries].map((entry) => ({
          ...entry,
          costLineTotal: entry.costPrice !== null ? entry.costPrice * entry.qty : 0,
          lineTotal: entry.price * entry.qty,
        }));
      }

      function createEntries() {
        return createEntriesForProject(state.project);
      }

      function getAdjustmentBase(scope, entries, subtotal) {
        if (scope === "project") {
          return { amount: subtotal, label: "全体" };
        }
        const entry = entries.find((item) => item.key === String(scope));
        return { amount: entry?.lineTotal || 0, label: entry?.name || "項目" };
      }

      function calcTotals(entries, adjustmentsSource = state.adjustments || []) {
        const subtotal = entries.reduce((sum, entry) => sum + entry.lineTotal, 0);
        const costSubtotal = entries.reduce((sum, entry) => sum + toPositiveInt(entry.costLineTotal, 0), 0);
        const adjustments = adjustmentsSource.map((adj) => {
          const base = getAdjustmentBase(adj.scope, entries, subtotal);
          const value = toPositiveInt(adj.value, 0);
          let amount = 0;
          if (adj.type === "discount-pct") {
            amount = -Math.round(base.amount * (value / 100));
          } else if (adj.type === "surcharge-pct") {
            amount = Math.round(base.amount * (value / 100));
          } else if (adj.type === "discount-fixed") {
            amount = -value;
          } else if (adj.type === "surcharge-fixed") {
            amount = value;
          }
          return {
            ...adj,
            scopeLabel: base.label,
            amount,
          };
        });
        const adjustmentTotal = adjustments.reduce((sum, entry) => sum + entry.amount, 0);
        return {
          subtotal,
          costSubtotal,
          adjustments,
          adjustmentTotal,
          total: Math.max(0, subtotal + adjustmentTotal),
        };
      }

      function toggleProjectResult(projectId) {
        uiState.projectResultOpen[projectId] = !uiState.projectResultOpen[projectId];
        render();
      }

      function getProjectAdjustmentOptions(project) {
        const entries = createEntriesForProject(project);
        return entries.map((entry) => ({
          value: entry.key,
          label: entry.name,
        }));
      }

      function syncProjectAdjustmentList(projectId, nextAdjustments) {
        const project = getEstimateProject(projectId);
        if (!project) {
          return;
        }

        project.priceAdjustments = nextAdjustments.map((entry) => createPriceAdjustment(entry));
        if (state.project && idsEqual(state.project.id, projectId)) {
          state.project.priceAdjustments = clone(project.priceAdjustments);
        }
        syncProjectIntoPayload();
        render();
      }

      function addProjectPriceAdjustment(projectId) {
        const project = getEstimateProject(projectId);
        if (!project) {
          return;
        }

        syncProjectAdjustmentList(projectId, [...(project.priceAdjustments || []), createPriceAdjustment()]);
      }

      function removeProjectPriceAdjustment(projectId, adjustmentId) {
        const project = getEstimateProject(projectId);
        if (!project) {
          return;
        }

        syncProjectAdjustmentList(projectId, (project.priceAdjustments || []).filter((entry) => entry.id !== adjustmentId));
      }

      function syncProjectPriceAdjustmentsFromDOM(projectId) {
        const root = document.querySelector(`[data-project-adjustments="${escapeHTML(projectId)}"]`);
        if (!root) {
          return;
        }

        const nextAdjustments = Array.from(root.querySelectorAll("[data-project-adj-row]")).map((row) => createPriceAdjustment({
          id: row.dataset.adjId,
          scope: row.querySelector("[data-project-adj-scope]")?.value || "project",
          type: row.querySelector("[data-project-adj-type]")?.value || "discount-pct",
          value: toPositiveInt(row.querySelector("[data-project-adj-value]")?.value, 0),
          label: row.querySelector("[data-project-adj-label]")?.value.trim() || "",
        }));

        const project = getEstimateProject(projectId);
        if (!project) {
          return;
        }
        project.priceAdjustments = nextAdjustments;
        if (state.project && idsEqual(state.project.id, projectId)) {
          state.project.priceAdjustments = clone(nextAdjustments);
        }
        syncProjectIntoPayload();
      }

      function renderProjectAdjustmentsEditor(project, adjustmentOptions) {
        const adjustments = Array.isArray(project?.priceAdjustments) ? project.priceAdjustments : [];
        return `
          <div class="project-adjustments-section" data-project-adjustments="${escapeHTML(project.id)}">
            <h4>割引・割増設定</h4>
            <div class="project-adjustments-grid">
              ${adjustments.map((adj) => `
                <div class="project-adjustment-row" data-project-adj-row data-adj-id="${escapeHTML(adj.id)}">
                  <select class="select" data-project-adj-scope>
                    <option value="project" ${adj.scope === "project" ? "selected" : ""}>全体</option>
                    ${adjustmentOptions.map((option) => `<option value="${escapeHTML(option.value)}"${String(adj.scope) === String(option.value) ? " selected" : ""}>${escapeHTML(option.label)}</option>`).join("")}
                  </select>
                  <select class="select" data-project-adj-type>
                    <option value="discount-pct" ${adj.type === "discount-pct" ? "selected" : ""}>割引（%）</option>
                    <option value="surcharge-pct" ${adj.type === "surcharge-pct" ? "selected" : ""}>割増（%）</option>
                    <option value="discount-fixed" ${adj.type === "discount-fixed" ? "selected" : ""}>割引（固定額）</option>
                    <option value="surcharge-fixed" ${adj.type === "surcharge-fixed" ? "selected" : ""}>割増（固定額）</option>
                  </select>
                  <input class="number-input" data-project-adj-value type="number" min="0" value="${toPositiveInt(adj.value, 0)}" placeholder="値" />
                  <input class="text-input" data-project-adj-label type="text" value="${escapeHTML(adj.label)}" placeholder="ラベル（任意）" />
                  <button class="pill-action pill-action-danger" data-action="remove-project-price-adjustment" data-project-id="${escapeHTML(project.id)}" data-adj-id="${escapeHTML(adj.id)}">削除</button>
                </div>
              `).join("")}
            </div>
            <button class="ghost-button" data-action="add-project-price-adjustment" data-project-id="${escapeHTML(project.id)}">割引・割増を追加</button>
          </div>
        `;
      }

      function renderProjectResultPanel(project) {
        const entries = createEntriesForProject(project);
        const showCostPrice = state.settings.showCostPrice;
        const showAdjustments = state.settings.showAdjustments;
        const projectAdjustments = showAdjustments && Array.isArray(project?.priceAdjustments) ? project.priceAdjustments : [];
        const totals = calcTotals(entries, projectAdjustments);
        const adjustmentSummary = showAdjustments && totals.adjustments.length > 0
          ? `${totals.adjustments.length} 件 / ${formatPrice(totals.adjustmentTotal)}`
          : "なし";
        const adjustmentOptions = getProjectAdjustmentOptions(project);

        return `
          <div class="project-result-panel">
            <div class="project-result-head">
              <div>
                <h3>${escapeHTML(project.name)} の明細</h3>
                <p>追加済みの機材・セット・追加費用と金額を確認できます。</p>
              </div>
            </div>
            ${entries.length > 0 ? `
              <div class="table-wrap">
                <table class="project-result-table">
                  <thead>
                    <tr>
                      <th>区分</th>
                      <th>項目</th>
                      <th>${showCostPrice ? "料金" : "単価"}</th>
                      <th>数量</th>
                      <th>小計</th>
                    </tr>
                  </thead>
                  <tbody>
                    ${entries.map((entry) => `
                      <tr>
                        <td>${escapeHTML(entry.kindLabel)}</td>
                        <td>
                          <strong>${escapeHTML(entry.name)}</strong>
                          ${entry.note ? `<div class="sub-line">${escapeHTML(entry.note)}</div>` : ""}
                        </td>
                        <td>
                          ${showCostPrice && entry.costPrice !== null
                            ? `<strong>${escapeHTML(formatPrice(entry.price))}</strong><div class="sub-line">下代 ${escapeHTML(formatPrice(entry.costPrice))}</div>`
                            : escapeHTML(formatPrice(entry.price))}
                        </td>
                        <td>${entry.qty}</td>
                        <td>${escapeHTML(formatPrice(entry.lineTotal))}</td>
                      </tr>
                    `).join("")}
                  </tbody>
                </table>
              </div>
            ` : `<div class="empty">まだ何も追加されていません。</div>`}
            <div class="project-result-summary">
              <div class="project-result-card">
                <strong>小計</strong>
                <span>${escapeHTML(formatPrice(totals.subtotal))}</span>
              </div>
              ${showCostPrice ? `
                <div class="project-result-card">
                  <strong>下代合計</strong>
                  <span>${escapeHTML(formatPrice(totals.costSubtotal))}</span>
                </div>
              ` : ""}
              ${showAdjustments ? `
                <div class="project-result-card">
                  <strong>調整</strong>
                  <span>${escapeHTML(adjustmentSummary)}</span>
                </div>
              ` : ""}
              <div class="project-result-card">
                <strong>合計</strong>
                <span>${escapeHTML(formatPrice(totals.total))}</span>
              </div>
            </div>
            ${showAdjustments ? renderProjectAdjustmentsEditor(project, adjustmentOptions) : ""}
          </div>
        `;
      }

      function syncProjectIntoPayload() {
        if (!currentPayload || !state.project) {
          return;
        }

        const nextProject = clone(state.project);
        const projects = Array.isArray(currentPayload?.snapshot?.estimateProjects)
          ? clone(currentPayload.snapshot.estimateProjects)
          : [];
        const existingIndex = projects.findIndex((entry) => idsEqual(entry.id, nextProject.id));
        if (existingIndex >= 0) {
          projects[existingIndex] = nextProject;
        } else {
          projects.push(nextProject);
        }

        currentPayload.snapshot.estimateProjects = projects;
        currentPayload.projectId = nextProject.id;
        currentPayload.projectName = nextProject.name;
        markTemplateDirty();
      }

      function setActiveEstimateProject(projectId) {
        const project = getEstimateProject(projectId);
        if (!project) {
          return;
        }
        currentPayload.projectId = project.id;
        currentPayload.projectName = project.name;
        state = createState(currentPayload);
        markTemplateDirty();
        render();
      }

      function addEstimateSelection(equipId) {
        const project = getActiveEstimateProject();
        if (!project || !canAddEstimateSelection(project.id, equipId)) {
          return;
        }
        setDirectQty(equipId, getProjectDirectQty(equipId) + 1);
      }

      function removeEstimateSelectionUnit(equipId) {
        if (!getActiveEstimateProject()) {
          return;
        }
        setDirectQty(equipId, getProjectDirectQty(equipId) - 1);
      }

      function addEstimatePackSelection(packId) {
        const project = getActiveEstimateProject();
        if (!project || !canAddEstimatePackSelection(project.id, packId)) {
          return;
        }
        setPackQty(packId, getProjectPackQty(packId) + 1);
      }

      function removeEstimatePackSelectionUnit(packId) {
        if (!getActiveEstimateProject()) {
          return;
        }
        setPackQty(packId, getProjectPackQty(packId) - 1);
      }

      function removeEstimatePackSelectionAll(packId) {
        if (!getActiveEstimateProject()) {
          return;
        }
        setPackQty(packId, 0);
      }

      function addEstimateExtraSelection(templateId) {
        if (!getActiveEstimateProject()) {
          return;
        }
        setExtraQty(templateId, getEstimateSelectedExtraQty(currentPayload?.projectId, templateId) + 1);
      }

      function removeEstimateExtraSelectionUnit(templateId) {
        if (!getActiveEstimateProject()) {
          return;
        }
        setExtraQty(templateId, getEstimateSelectedExtraQty(currentPayload?.projectId, templateId) - 1);
      }

      function removeEstimateExtraSelectionAll(templateId) {
        if (!getActiveEstimateProject()) {
          return;
        }
        setExtraQty(templateId, 0);
      }

      function renderEquipmentFilterPanel(manufacturerOptions, genreOptions, typeOptions, ownershipNames) {
        return `
          <div class="filter-panel">
            <select id="filter-manufacturer" class="select">
              <option value="">全メーカー</option>
              ${manufacturerOptions.map((option) => `<option value="${escapeHTML(option)}"${uiState.filterManufacturer === option ? " selected" : ""}>${escapeHTML(option)}</option>`).join("")}
            </select>
            <select id="filter-genre" class="select">
              <option value="">全ジャンル</option>
              ${genreOptions.map((option) => `<option value="${escapeHTML(option)}"${uiState.filterGenre === option ? " selected" : ""}>${escapeHTML(option)}</option>`).join("")}
            </select>
            <select id="filter-type" class="select">
              <option value="">全種類</option>
              ${typeOptions.map((option) => `<option value="${escapeHTML(option)}"${uiState.filterType === option ? " selected" : ""}>${escapeHTML(option)}</option>`).join("")}
            </select>
            <select id="filter-ownership" class="select">
              <option value="">全所有</option>
              ${ownershipNames.map((option) => `<option value="${escapeHTML(option)}"${uiState.filterOwnership === option ? " selected" : ""}>${escapeHTML(option)}</option>`).join("")}
            </select>
            <button class="danger-button" data-action="clear-filters">条件をクリア</button>
          </div>
        `;
      }

      function renderEstimateProjects(projects) {
        if (projects.length === 0) {
          return `
            <div class="empty-state compact">
              <div class="empty-state-mark">+</div>
              <h2>見積もりがまだありません</h2>
              <p>共有データは読み込まれています。まず見積もりを作成してください。</p>
              <button class="primary-button" data-action="create-estimate-project">見積もりを作成</button>
            </div>
          `;
        }

        return `
          <div class="project-grid">
            ${projects.map((entry) => {
              const totals = getEstimateProjectTotals(entry);
              const resultOpen = Boolean(uiState.projectResultOpen[entry.id]);
              return `
                <div class="project-stack">
                  <article class="project-card ${idsEqual(currentPayload?.projectId, entry.id) ? "active" : ""}">
                    <button class="project-card-main" data-action="set-active-estimate-project" data-project-id="${escapeHTML(entry.id)}">
                      <strong>${escapeHTML(entry.name)}</strong>
                      <span>機材 ${totals.qty} 点 / セット ${totals.packQty} 件 / 追加費用 ${totals.extraCount} 件</span>
                    </button>
                    <div class="project-card-actions">
                      <button class="mini-button" data-action="toggle-project-result" data-project-id="${escapeHTML(entry.id)}">${resultOpen ? "閉じる" : "明細"}</button>
                      <button class="asset-icon-button" data-action="delete-estimate-project" data-project-id="${escapeHTML(entry.id)}" aria-label="見積もりを削除">×</button>
                    </div>
                  </article>
                  ${resultOpen ? renderProjectResultPanel(entry) : ""}
                </div>
              `;
            }).join("")}
          </div>
        `;
      }

      function renderEstimateWorkspace(project) {
        const filtered = getEquipmentByFilters();
        const manufacturerOptions = getLinkedFilterOptions("manufacturer");
        const genreOptions = getLinkedFilterOptions("genre");
        const typeOptions = getLinkedFilterOptions("type");
        const ownershipNames = getLinkedFilterOptions("ownership");
        const projectTotals = getEstimateProjectTotals(project);
        const packagesOpen = uiState.estimateSectionOpen.packages;
        const extrasOpen = uiState.estimateSectionOpen.extras;

        return `
          <section class="panel section-panel-inner">
            <div class="section-head">
              <div>
                <h2>${escapeHTML(project.name)}</h2>
              </div>
              <div class="selection-workspace-actions">
                <span class="selection-project-summary">機材 ${projectTotals.qty} 点 / セット ${projectTotals.packQty} 件 / 追加費用 ${projectTotals.extraCount} 件</span>
              </div>
            </div>

            <section class="panel estimate-subsection estimate-panel-packages">
              <div class="section-head">
                <div>
                  <h2>セット</h2>
                </div>
                <div class="section-head-actions">
                  <button class="mini-button" data-action="toggle-estimate-section" data-section="packages">${packagesOpen ? "畳む" : "開く"}</button>
                </div>
              </div>
              ${packagesOpen ? `
                ${(state.snapshot.packs || []).length > 0 ? `
                  <div class="inventory-grid pack-grid">
                    ${(state.snapshot.packs || []).map((pack) => {
                      const selectedQty = getEstimateSelectedPackQty(project.id, pack.id);
                      const canAdd = canAddEstimatePackSelection(project.id, pack.id);
                      return `
                        <article class="inventory-card">
                          <div class="inventory-card-top">
                            <div class="inventory-card-main">
                              <div class="equipment-cell">
                                <span class="manufacturer-chip">SET</span>
                                <span class="equipment-name">${escapeHTML(pack.name)}</span>
                              </div>
                              <div class="inventory-inline-groups">
                                <div class="inline-info">
                                  <span class="info-label">料金</span>
                                  <span class="price-value">${escapeHTML(formatPrice(pack.price))}</span>
                                </div>
                              </div>
                            </div>
                          </div>
                          <div class="inventory-card-bottom">
                            <div class="info-group info-group-wide">
                              <span class="info-label">内容</span>
                              <p class="note-text">${escapeHTML(getPackItemSummary(pack) || "機材未設定")}</p>
                            </div>
                          </div>
                          <div class="card-actions">
                            <div class="action-cluster">
                              <button class="pill-action" data-action="remove-estimate-pack-selection-unit" data-pack-id="${escapeHTML(pack.id)}" ${selectedQty <= 0 ? "disabled" : ""}>-</button>
                              <span class="selected-qty ${selectedQty <= 0 ? "is-zero" : ""}">${selectedQty}</span>
                              <button class="pill-action" data-action="add-estimate-pack-selection" data-pack-id="${escapeHTML(pack.id)}" ${!canAdd ? "disabled" : ""}>+</button>
                            </div>
                          </div>
                        </article>
                      `;
                    }).join("")}
                  </div>
                ` : `<div class="empty-state compact"><p>セットはまだありません。</p></div>`}
              ` : `<div class="estimate-collapsed-note">${projectTotals.packQty} 件を選択中</div>`}
            </section>

            <section class="panel estimate-subsection estimate-panel-extras">
              <div class="section-head">
                <div>
                  <h2>追加費用</h2>
                </div>
                <div class="section-head-actions">
                  <button class="mini-button" data-action="toggle-estimate-section" data-section="extras">${extrasOpen ? "畳む" : "開く"}</button>
                </div>
              </div>
              ${extrasOpen ? `
                ${(state.snapshot.extraFeeTemplates || []).length > 0 ? `
                  <div class="inventory-grid pack-grid extra-fee-grid">
                    ${(state.snapshot.extraFeeTemplates || []).map((item) => {
                      const selectedQty = getEstimateSelectedExtraQty(project.id, item.id);
                      return `
                        <article class="inventory-card">
                          <div class="inventory-card-top">
                            <div class="inventory-card-main">
                              <div class="equipment-cell">
                                <span class="manufacturer-chip">FEE</span>
                                <span class="equipment-name">${escapeHTML(item.name)}</span>
                              </div>
                              <div class="inventory-inline-groups">
                                <div class="inline-info">
                                  <span class="info-label">区分</span>
                                  <span>${escapeHTML(item.category)}</span>
                                </div>
                                <div class="inline-info">
                                  <span class="info-label">単価</span>
                                  <span class="price-value">${escapeHTML(formatPrice(item.unitPrice))}</span>
                                </div>
                              </div>
                            </div>
                          </div>
                          <div class="inventory-card-bottom">
                            <div class="info-group info-group-wide">
                              <span class="info-label">メモ</span>
                              <p class="note-text">${escapeHTML(item.notes || "-")}</p>
                            </div>
                          </div>
                          <div class="card-actions">
                            <div class="action-cluster">
                              <button class="pill-action" data-action="remove-estimate-extra-selection-unit" data-template-id="${escapeHTML(item.id)}" ${selectedQty <= 0 ? "disabled" : ""}>-</button>
                              <span class="selected-qty ${selectedQty <= 0 ? "is-zero" : ""}">${selectedQty}</span>
                              <button class="pill-action" data-action="add-estimate-extra-selection" data-template-id="${escapeHTML(item.id)}">+</button>
                            </div>
                          </div>
                        </article>
                      `;
                    }).join("")}
                  </div>
                ` : `<div class="empty-state compact"><p>追加費用テンプレートはまだありません。</p></div>`}

                ${(project.extraItems || []).length > 0 ? `
                  <div class="estimate-selected-list">
                    <div class="section-head estimate-selected-head">
                      <div>
                        <h3>選択中の追加費用</h3>
                        <p>この見積もりに反映される費用項目です。</p>
                      </div>
                    </div>
                    <div class="history-list">
                      ${(project.extraItems || []).map((item) => `
                        <article class="history-card">
                          <header class="history-header">
                            <div class="history-title">
                              ${badge(item.category, "badge-gray")}
                              <strong>${escapeHTML(item.name)}</strong>
                              <span>${escapeHTML(formatPrice(item.unitPrice))} × ${item.qty}</span>
                            </div>
                            <div class="history-header-actions">
                              <span>${escapeHTML(formatPrice(item.unitPrice * item.qty))}</span>
                              ${item.extraFeeId ? `<button class="mini-button danger-button" data-action="remove-estimate-extra-selection-all" data-template-id="${escapeHTML(item.extraFeeId)}">外す</button>` : ""}
                            </div>
                          </header>
                        </article>
                      `).join("")}
                    </div>
                  </div>
                ` : ""}
              ` : `<div class="estimate-collapsed-note">${projectTotals.extraCount} 件を登録中</div>`}
            </section>

            <div class="toolbar">
              <div class="search-wrap">
                <input id="search-text" class="text-input" type="text" value="${escapeHTML(uiState.searchText)}" placeholder="メーカー・機材名・メモ・所有で検索" />
              </div>
              <button class="ghost-button" data-action="create-estimate-project">別見積もりを追加</button>
            </div>

            ${renderEquipmentFilterPanel(manufacturerOptions, genreOptions, typeOptions, ownershipNames)}

            <div class="muted-row">
              <span>${filtered.length} 件から見積もりへ追加できます</span>
              <span>現在の見積もり: ${escapeHTML(project.name)}</span>
            </div>

            <div class="selection-picker-grid">
              ${filtered.map((item) => {
                const selectedQty = getEstimateSelectedQty(project.id, item.id);
                const requiredQty = getEstimateRequiredQty(project.id, item.id);
                const remainingStock = getEstimateRemainingStock(project.id, item.id);
                const stockClass = remainingStock <= 0 ? "stock-empty" : remainingStock <= 2 ? "stock-low" : "stock-ok";
                return `
                  <article class="inventory-card selection-picker-card">
                    <div class="inventory-card-top">
                      <div class="inventory-card-main">
                        <div class="equipment-cell">
                          ${equipmentHeading(item)}
                        </div>
                        <div class="inventory-inline-groups">
                          ${state.settings.showStock ? `
                            <div class="inline-info">
                              <span class="info-label">在庫残</span>
                              <span class="stock ${stockClass}">${remainingStock}</span>
                              <span class="inventory-stock-total">/ ${toPositiveInt(item.stock, 0)}</span>
                            </div>
                          ` : ""}
                          <div class="inline-info">
                            <span class="info-label">${item.isNetPrice && state.settings.showCostPrice ? "上代 / 下代" : item.isNetPrice ? "上代" : "価格"}</span>
                            <span class="price-value">${escapeHTML(formatPrice(item.price))}${item.isNetPrice && state.settings.showCostPrice ? ` / ${escapeHTML(formatPrice(item.priceLower))}` : ""}</span>
                          </div>
                          <div class="inline-info">
                            <span class="info-label">見積数</span>
                            <span>${requiredQty}</span>
                          </div>
                        </div>
                      </div>
                    </div>
                    ${item.notes ? `
                      <div class="inventory-card-bottom">
                        <div class="info-group info-group-wide">
                          <span class="info-label">メモ</span>
                          <p class="note-text">${escapeHTML(item.notes)}</p>
                        </div>
                      </div>
                    ` : ""}
                    <div class="card-actions">
                      <div class="action-cluster">
                        <button class="pill-action" data-action="remove-estimate-selection-unit" data-equip-id="${escapeHTML(String(item.id))}" ${selectedQty <= 0 ? "disabled" : ""}>-</button>
                        <span class="selected-qty ${selectedQty <= 0 ? "is-zero" : ""}">${selectedQty}</span>
                        <button class="pill-action" data-action="add-estimate-selection" data-equip-id="${escapeHTML(String(item.id))}" ${(state.settings.showStock || !state.settings.ignoreStockLimit) && remainingStock <= 0 ? "disabled" : ""}>+</button>
                      </div>
                    </div>
                  </article>
                `;
              }).join("")}
            </div>
          </section>
        `;
      }

      function setProjectItemQty(collectionKey, matchKey, matchValue, nextValue, createEntry) {
        if (!state.project) {
          return;
        }

        const list = Array.isArray(state.project[collectionKey]) ? state.project[collectionKey] : [];
        const entryIndex = list.findIndex((entry) => idsEqual(entry[matchKey], matchValue));
        const safeQty = Math.max(toPositiveInt(nextValue, 0), 0);

        if (safeQty <= 0) {
          if (entryIndex >= 0) {
            list.splice(entryIndex, 1);
          }
          state.project[collectionKey] = list;
          syncProjectIntoPayload();
          render();
          return;
        }

        if (entryIndex >= 0) {
          list[entryIndex].qty = safeQty;
        } else {
          list.push(createEntry(safeQty));
        }

        state.project[collectionKey] = list;
        syncProjectIntoPayload();
        render();
      }

      function setDirectQty(equipId, nextQty) {
        setProjectItemQty("items", "equipId", equipId, nextQty, (safeQty) => ({
          id: `item-${Date.now()}-${Math.random().toString(16).slice(2, 8)}`,
          equipId,
          qty: safeQty,
        }));
      }

      function setPackQty(packId, nextQty) {
        setProjectItemQty("packItems", "packId", packId, nextQty, (safeQty) => ({
          id: `pack-${Date.now()}-${Math.random().toString(16).slice(2, 8)}`,
          packId,
          qty: safeQty,
        }));
      }

      function setExtraQty(extraId, nextQty) {
        const template = getExtraFeeTemplate(extraId);
        if (!template) {
          return;
        }
        setProjectItemQty("extraItems", "extraFeeId", extraId, nextQty, (safeQty) => ({
          id: `extra-${Date.now()}-${Math.random().toString(16).slice(2, 8)}`,
          extraFeeId: extraId,
          name: template.name || "追加費用",
          category: template.category || "その他",
          unitPrice: toPositiveInt(template.unitPrice, 0),
          qty: safeQty,
          notes: template.notes || "",
        }));
      }

      function renderTable(entries) {
        const priceHeader = state.settings.showCostPrice ? "価格" : "価格";
        const stockHeader = state.settings.showStock ? "在庫数" : "";
        return `
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>項目</th>
                  ${state.settings.showStock ? `<th>${stockHeader}</th>` : ""}
                  <th>${priceHeader}</th>
                  ${state.settings.showCostPrice ? `<th>仕入れ値</th>` : ""}
                  <th>数量</th>
                  <th>小計</th>
                </tr>
              </thead>
              <tbody>
                ${entries.map((entry) => `
                  <tr>
                    <td>
                      <div class="item-name">
                        <div><span class="item-kind">${escapeHTML(entry.kindLabel)}</span></div>
                        <strong>${escapeHTML(entry.name)}</strong>
                        ${entry.note ? `<span class="sub-line">${escapeHTML(entry.note)}</span>` : ""}
                      </div>
                    </td>
                    ${state.settings.showStock ? `<td>${entry.stock === null ? `<span class="muted">-</span>` : `<span class="stock-chip">${entry.stock}</span>`}</td>` : ""}
                    <td>${escapeHTML(formatPrice(entry.price))}</td>
                    ${state.settings.showCostPrice ? `<td>${entry.costPrice === null ? `<span class="muted">-</span>` : escapeHTML(formatPrice(entry.costPrice))}</td>` : ""}
                    <td>
                      <div class="qty-controls">
                        <button data-action="decrease" data-type="${entry.type}" data-id="${escapeHTML(String(entry.id))}" ${entry.qty <= 0 ? "disabled" : ""}>-</button>
                        <span class="qty-value">${entry.qty}</span>
                        <button
                          data-action="increase"
                          data-type="${entry.type}"
                          data-id="${escapeHTML(String(entry.id))}"
                          ${(entry.type === "equipment" && !canAddEquipment(entry.id)) || (entry.type === "pack" && !canAddPack(entry.id)) ? "disabled" : ""}
                        >+</button>
                      </div>
                    </td>
                    <td>${escapeHTML(formatPrice(entry.lineTotal))}</td>
                  </tr>
                `).join("")}
              </tbody>
            </table>
          </div>
        `;
      }

      function render() {
        if (!currentPayload) {
          document.title = "見積もり表";
          app.innerHTML = `
            <section class="hero">
              <span class="eyebrow">Estimate Page</span>
              <h1>見積もり表</h1>
              <p>共有データ JSON を読み込んでください。</p>
              ${renderImportControls()}
              <div class="error">
                <strong>見積データを読み込めませんでした。</strong>
                <p>共有データ JSON を選択してください。</p>
              </div>
            </section>
          `;
          return;
        }

        document.title = state.settings.pageTitle;
        const projects = Array.isArray(currentPayload?.snapshot?.estimateProjects) ? currentPayload.snapshot.estimateProjects : [];
        const project = getActiveEstimateProject();

        app.innerHTML = `
          <section class="hero">
            <span class="eyebrow">Estimate Page</span>
            <h1>${escapeHTML(state.settings.pageTitle)}</h1>
            <p>${escapeHTML(project?.name || state.projectName || "見積もり")}</p>
            ${renderImportControls()}
          </section>

          <section class="layout">
            <section class="panel">
              <div class="section-head">
                <div>
                  <h2>見積もり</h2>
                </div>
                <div class="section-head-actions">
                  <button class="primary-button" data-action="create-estimate-project">見積もりを追加</button>
                </div>
              </div>
              ${renderEstimateProjects(projects)}
              ${project ? renderEstimateWorkspace(project) : ""}
            </section>

          </section>
        `;
      }

      window.addEventListener("beforeunload", (event) => {
        if (!hasUnsavedTemplateChanges) {
          return;
        }
        event.preventDefault();
        event.returnValue = "";
      });

      document.addEventListener("click", (event) => {
        const button = event.target.closest("[data-action]");
        if (!button) {
          return;
        }

        if (button.dataset.action === "open-import") {
          void openImportPicker();
          return;
        }

        if (button.dataset.action === "save-template-html") {
          void saveTemplateToHtml(true);
          return;
        }

        if (button.dataset.action === "edit-template-title") {
          editTemplateTitle();
          return;
        }

        if (button.dataset.action === "create-estimate-project") {
          createEstimateProjectFromPrompt();
          return;
        }

        if (button.dataset.action === "set-active-estimate-project") {
          setActiveEstimateProject(button.dataset.projectId);
          return;
        }

        if (button.dataset.action === "toggle-project-result") {
          toggleProjectResult(button.dataset.projectId);
          return;
        }

        if (button.dataset.action === "delete-estimate-project") {
          deleteEstimateProject(button.dataset.projectId);
          return;
        }

        if (button.dataset.action === "add-project-price-adjustment") {
          addProjectPriceAdjustment(button.dataset.projectId);
          return;
        }

        if (button.dataset.action === "remove-project-price-adjustment") {
          removeProjectPriceAdjustment(button.dataset.projectId, button.dataset.adjId);
          return;
        }

        if (button.dataset.action === "toggle-estimate-section") {
          toggleEstimateSection(button.dataset.section);
          return;
        }

        if (button.dataset.action === "clear-filters") {
          clearFilters();
          return;
        }

        if (button.dataset.action === "add-estimate-selection") {
          addEstimateSelection(button.dataset.equipId);
          return;
        }

        if (button.dataset.action === "remove-estimate-selection-unit") {
          removeEstimateSelectionUnit(button.dataset.equipId);
          return;
        }

        if (button.dataset.action === "add-estimate-pack-selection") {
          addEstimatePackSelection(button.dataset.packId);
          return;
        }

        if (button.dataset.action === "remove-estimate-pack-selection-unit") {
          removeEstimatePackSelectionUnit(button.dataset.packId);
          return;
        }

        if (button.dataset.action === "remove-estimate-pack-selection-all") {
          removeEstimatePackSelectionAll(button.dataset.packId);
          return;
        }

        if (button.dataset.action === "add-estimate-extra-selection") {
          addEstimateExtraSelection(button.dataset.templateId);
          return;
        }

        if (button.dataset.action === "remove-estimate-extra-selection-unit") {
          removeEstimateExtraSelectionUnit(button.dataset.templateId);
          return;
        }

        if (button.dataset.action === "remove-estimate-extra-selection-all") {
          removeEstimateExtraSelectionAll(button.dataset.templateId);
          return;
        }

        const type = button.dataset.type;
        const id = button.dataset.id;
        const direction = button.dataset.action;
        if (!type || !id) {
          return;
        }

        if (type === "equipment") {
          const currentQty = getProjectDirectQty(id);
          if (direction === "increase" && canAddEquipment(id)) {
            setDirectQty(id, currentQty + 1);
          }
          if (direction === "decrease") {
            setDirectQty(id, currentQty - 1);
          }
          return;
        }

        if (type === "pack") {
          const currentQty = getProjectPackQty(id);
          if (direction === "increase" && canAddPack(id)) {
            setPackQty(id, currentQty + 1);
          }
          if (direction === "decrease") {
            setPackQty(id, currentQty - 1);
          }
          return;
        }

        if (type === "extra") {
          const currentQty = (state.project?.extraItems || []).find((entry) => entry.id === String(id))?.qty || 0;
          if (direction === "increase") {
            setExtraQty(id, currentQty + 1);
          }
          if (direction === "decrease") {
            setExtraQty(id, currentQty - 1);
          }
        }
      });

      document.addEventListener("change", (event) => {
        if (event.target.id === "estimate-file-input") {
          void importListFile(event.target.files?.[0] || null, {
            sourceLabel: event.target.files?.[0]?.name || "読み込みデータ",
          });
          event.target.value = "";
          return;
        }

        if (event.target.matches("[data-project-adj-scope]") || event.target.matches("[data-project-adj-type]") || event.target.matches("[data-project-adj-value]") || event.target.matches("[data-project-adj-label]")) {
          const root = event.target.closest("[data-project-adjustments]");
          const projectId = root?.dataset.projectAdjustments;
          if (projectId) {
            syncProjectPriceAdjustmentsFromDOM(projectId);
            render();
          }
          return;
        }

        if (event.target.id === "filter-manufacturer") {
          uiState.filterManufacturer = event.target.value;
          render();
          return;
        }

        if (event.target.id === "filter-genre") {
          uiState.filterGenre = event.target.value;
          render();
          return;
        }

        if (event.target.id === "filter-type") {
          uiState.filterType = event.target.value;
          render();
          return;
        }

        if (event.target.id === "filter-ownership") {
          uiState.filterOwnership = event.target.value;
          render();
        }
      });

      document.addEventListener("input", (event) => {
        if (event.target.id === "search-text") {
          uiState.searchText = event.target.value;
          render();
        }
      });

      document.addEventListener("keydown", (event) => {
        if ((event.metaKey || event.ctrlKey) && event.key.toLowerCase() === "s") {
          event.preventDefault();
          void saveTemplateToHtml(true);
        }
      });

      render();
    </script>
  </body>
</html>
